version: '3.8'

services:
  mariadb:
    image: mariadb:11
    container_name: media-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-mediaroot123}
      MYSQL_DATABASE: media_storage_service
      MYSQL_USER: mediauser
      MYSQL_PASSWORD: ${DB_PASSWORD:-mediapass123}
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-mediaroot123}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: media-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: media-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: mediauser
      DB_PASSWORD: ${DB_PASSWORD:-mediapass123}
      DB_NAME: media_storage_service
      REDIS_HOST: redis
      REDIS_PORT: 6379
      UPLOAD_DIR: /app/uploads
      BASE_URL: ${BASE_URL:-https://piwebtechnology.com/image-upload}
      MAX_FILE_SIZE: 104857600
    ports:
      - "4000:4000"
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: media-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mariadb_data:
  redis_data:
  uploads_data:
  logs_data:
